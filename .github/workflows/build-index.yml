name: Build indexes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'projects/**'
      - 'bin/build-index.py'
      - 'templates/**'
      - 'js/**'
      - 'css/**'
      - 'meta.json'
      - 'reading.json'
      - 'gaming.json'
      - 'coding.json'
      - 'images/_variants.json'
      - '.github/workflows/build-index.yml'

# Only one rebuild at a time; coalesce rapid pushes
concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml markdown jinja2

      - name: Rebuild site outputs
        run: python3 bin/build-index.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- posts.json projects.json index.html blog/index.html post/ projects/ 404.html resume/index.html sitemap.xml feed.xml; then
            echo "site outputs already up to date — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json projects.json index.html blog/index.html post/ projects/ 404.html resume/index.html sitemap.xml feed.xml
          git commit -m "ci: rebuild site outputs [skip ci]"
          git push
