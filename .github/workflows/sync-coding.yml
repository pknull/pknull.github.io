name: Sync coding

on:
  workflow_dispatch:
  schedule:
    # Hourly at :49 — offset from sync-reading (:23) and sync-gaming (:37)
    # to avoid overlap and stay out of the cron stampede.
    - cron: '49 * * * *'

concurrency:
  group: sync-coding
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync most-active repo from GitHub events
        run: python3 bin/sync-coding.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet coding.json; then
            echo "coding.json already up to date — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coding.json
          git commit -m "ci: sync most-active repo [skip ci]"
          git push
