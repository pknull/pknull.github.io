name: Sync reading

on:
  workflow_dispatch:
  schedule:
    # Hourly at :23 — Goodreads' RSS ttl is 60 min anyway, and an off-zero
    # minute keeps us out of the cron stampede.
    - cron: '23 * * * *'

concurrency:
  group: sync-reading
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync currently-reading from Goodreads
        run: python3 bin/sync-reading.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet reading.json; then
            echo "reading.json already up to date — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reading.json
          git commit -m "ci: sync currently-reading [skip ci]"
          git push
