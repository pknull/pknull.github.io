<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dreadful Engine</title>
<link rel="stylesheet" href="maze.css">

</head>
<body>
<div id="blocker">
    <a class="journal-return" href="/">&larr; PKNULL.AI</a>
    <h1>THE DREADFUL ENGINE</h1>
    <p>Click to enter</p>
    <p class="sub">WASD to move / Mouse to look / Click or E to interact</p>
    <p class="seed" id="seedLine"></p>
    <div class="options" id="options">
        <label><input type="checkbox" id="optHard"> HARD MODE <span class="opt-desc">— no minimap</span></label>
        <label><input type="checkbox" id="optCheat"> CHEAT <span class="opt-desc">— show solutions &dagger;</span></label>
        <label>DAILY <input type="date" id="optDate"> <span class="opt-desc">— replay any day</span></label>
    </div>
</div>
<div id="hud">
    <div class="room-info" id="roomInfo"></div>
    <div class="tess-info" id="tessInfo"></div>
    <div class="hint" id="hint"></div>
    <div class="goal" id="goalInfo">ESCAPE TO THE ENTRYWAY<div class="seed-info" id="seedInfo"></div></div>
    <div class="maze-label" id="mazeLabel"></div>
    <div class="event-message" id="eventMessage"></div>
</div>
<div id="crosshair"></div>
<div id="win">
    <h1>YOU ESCAPED</h1>
    <p id="winTime"></p>
    <p id="winMazes"></p>
    <p id="winTrail"></p>
    <button id="shareBtn" type="button">SHARE RESULT</button>
</div>
<div id="trap-flash"></div>
<div id="shade-veil"></div>
<canvas id="minimap" width="160" height="160"></canvas>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script>
function showMazeStartupFailure(event) {
    if (document.documentElement.dataset.mazeReady === 'true') return;
    if (event.type === 'error' && event.target !== window && event.target.tagName !== 'SCRIPT') return;
    document.querySelector('#blocker > p').textContent = 'Initialization failed — reload to retry';
    document.getElementById('seedLine').textContent = 'THE ENGINE IS UNAVAILABLE';
}
window.addEventListener('error', showMazeStartupFailure, true);
window.addEventListener('unhandledrejection', showMazeStartupFailure);
</script>
<script type="module" src="game.js"></script>

</body>
</html>
