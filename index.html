  <!-- Initial mode resolution: avoid FOUC on dark/auto -->
  <script>
    (function(){
      try {
        var stored = localStorage.getItem('pk-mode');
        var mode = stored === 'dark' || stored === 'light' || stored === 'auto' ? stored : 'auto';
        var resolved = mode === 'auto'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        if (resolved === 'dark') document.documentElement.setAttribute('data-mode', 'dark');
      } catch (e) {}
    })();
  </script>

  <!-- Google Analytics - loaded only after consent -->

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    var gaLoaded = false;

    function loadGoogleAnalytics() {
      if (gaLoaded) return;
      gaLoaded = true;

      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=G-YBVLPYGBNY';
      document.head.appendChild(script);

      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'granted'
      });
      gtag('js', new Date());
      gtag('config', 'G-YBVLPYGBNY');
    }

    if (localStorage.getItem('analytics_consent') === 'granted') {
      loadGoogleAnalytics();
    }
  </script>
